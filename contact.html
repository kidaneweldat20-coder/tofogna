        <div class="logo">

            <span class="bar"></span>

        </nav>
    </header>

    <section class="contact-page-container">
        <div class="contact-info">
            <h2>ርኸቡና</h2>
            <div class="underline"></div>
            <p>ንዝኾነ ናይ ስነ-ጽሑፍ ስራሕቲ ወይ ርእይቶ፡ በዚ ዝስዕብ ቅጥዒ መልእኽቲ ስደዱለይ።</p>
        </div>

        <div class="contact-form-wrapper">
            <form action="https://formspree.io/f/xeevgrwk" method="POST">
                <div class="input-group">
                    <label>ስምኩም</label>
                    <input type="text" name="name" placeholder="ስምኩም ኣብዚ ጸሓፉ" required>
                </div>
                
                <div class="input-group">
                    <label>ኢመይልኩም</label>
                    <input type="email" name="email" placeholder="example@gmail.com" required>
                </div>

                <div class="input-group">
                    <label>መልእኽትኹም</label>
                    <textarea name="message" rows="5" placeholder="መልእኽትኹም ኣብዚ ጸሓፉ..." required></textarea>
                </div>
                
                <button type="submit" class="btn">መልእኽቲ ስደድ</button>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 ጦፈኛ - ኩሉ መሰል ዝተሓለወ እዩ።</p>
